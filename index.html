<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汎用ハンドボール トーナメント結果管理</title>
    
    <!-- React & Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a;
        }
        
        /* 印刷設定: チーム数に応じてスケールを調整しA4に収める */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-wrapper { box-shadow: none !important; border: none !important; padding: 0 !important; background: transparent !important; }
            
            .scale-16 { transform: scale(0.70); transform-origin: top left; }
            .scale-8 { transform: scale(0.95); transform-origin: top center; }
            .scale-4 { transform: scale(1); transform-origin: top center; }

            /* 印刷時の入力欄のボーダーを消して文字だけにする */
            .print-input-clean { border: none !important; background: transparent !important; padding: 0 !important; }
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // === トーナメントロジック・構造生成 ===
        const buildTournamentTree = (teamCount) => {
            const matches = {};
            // 初期化
            for(let i=1; i<=teamCount; i++) {
                matches[`m${i}`] = { 
                    id: `m${i}`, p1: '', p2: '', 
                    s1: { f:'', s:'', t:'' }, s2: { f:'', s:'', t:'' }, 
                    winner: null, loser: null, time: '', official: '',
                    nextMatch: null, nextPos: null, loserMatch: null, loserPos: null
                };
            }
            
            // 1回戦のチーム名プレースホルダー
            for(let i=1; i<=teamCount/2; i++) {
                matches[`m${i}`].p1 = `チーム${i*2-1}`;
                matches[`m${i}`].p2 = `チーム${i*2}`;
            }

            let prevRoundStart = 1;
            let prevRoundCount = teamCount / 2;
            let currentMatchId = teamCount / 2 + 1;
            const rounds = Math.log2(teamCount);
            
            for (let r = 1; r < rounds; r++) {
                const currentRoundCount = prevRoundCount / 2;
                for (let i = 0; i < currentRoundCount; i++) {
                    const p1Id = `m${prevRoundStart + i * 2}`;
                    const p2Id = `m${prevRoundStart + i * 2 + 1}`;
                    const nextId = `m${currentMatchId}`;
                    
                    matches[p1Id].nextMatch = nextId;
                    matches[p1Id].nextPos = 'p1';
                    matches[p2Id].nextMatch = nextId;
                    matches[p2Id].nextPos = 'p2';
                    
                    // 準決勝の敗者は3位決定戦へ
                    if (r === rounds - 1) {
                        const thirdPlaceId = `m${teamCount}`;
                        matches[p1Id].loserMatch = thirdPlaceId;
                        matches[p1Id].loserPos = 'p1';
                        matches[p2Id].loserMatch = thirdPlaceId;
                        matches[p2Id].loserPos = 'p2';
                    }
                    currentMatchId++;
                }
                prevRoundStart += prevRoundCount;
                prevRoundCount = currentRoundCount;
            }
            return matches;
        };

        // ツリーの座標計算
        const CARD_W = 160;
        const CARD_H = 82;
        const GAP_X = 50;
        const GAP_Y = 24;
        const P1_Y_OFFSET = 28;
        const P2_Y_OFFSET = 62;
        const MID_Y_OFFSET = 45;

        const calculateCoords = (teamCount) => {
            const coords = {};
            const rounds = Math.log2(teamCount);
            
            for (let i = 0; i < teamCount / 2; i++) {
                coords[`m${i+1}`] = { x: 0, y: i * (CARD_H + GAP_Y) };
            }
            
            let currentMatchId = teamCount / 2 + 1;
            let prevRoundStart = 1;
            let prevRoundCount = teamCount / 2;
            
            for (let r = 1; r < rounds; r++) {
                const currentRoundCount = prevRoundCount / 2;
                for (let i = 0; i < currentRoundCount; i++) {
                    const parent1Id = `m${prevRoundStart + i * 2}`;
                    const parent2Id = `m${prevRoundStart + i * 2 + 1}`;
                    coords[`m${currentMatchId}`] = {
                        x: r * (CARD_W + GAP_X),
                        y: (coords[parent1Id].y + coords[parent2Id].y) / 2
                    };
                    currentMatchId++;
                }
                prevRoundStart += prevRoundCount;
                prevRoundCount = currentRoundCount;
            }
            
            // 3位決定戦
            const finalId = `m${teamCount - 1}`;
            const thirdPlaceId = `m${teamCount}`;
            coords[thirdPlaceId] = {
                x: coords[finalId].x,
                y: coords[finalId].y + CARD_H + GAP_Y * 2
            };
            
            return coords;
        };

        // 線を描画するコンポーネント
        const BracketLine = ({ x1, y1, x2, y2 }) => {
            const midX = x1 + (x2 - x1) / 2;
            return <path d={`M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`} fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinejoin="round" />;
        };

        // === サブコンポーネント：入力モーダル ===
        const MatchEditModal = ({ matchId, matchData, onClose, onSave }) => {
            const [data, setData] = useState(JSON.parse(JSON.stringify(matchData)));
            const [manualWinner, setManualWinner] = useState(matchData.winner);

            const handleScore = (side, half, val) => {
                const num = val.replace(/[^0-9]/g, '').slice(0, 2);
                const newData = { ...data };
                newData[side][half] = num;
                
                const f = parseInt(newData[side].f || 0);
                const s = parseInt(newData[side].s || 0);
                newData[side].t = (newData[side].f !== '' || newData[side].s !== '') ? (f + s).toString() : '';
                
                setData(newData);
                setManualWinner(null); // スコア変更時は手動判定をリセット
            };

            const save = () => {
                let finalWinner = manualWinner;
                if (!finalWinner) {
                    const t1 = parseInt(data.s1.t);
                    const t2 = parseInt(data.s2.t);
                    if (!isNaN(t1) && !isNaN(t2) && t1 !== t2) {
                        finalWinner = t1 > t2 ? 'p1' : 'p2';
                    }
                }
                onSave(matchId, data, finalWinner);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
                        <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold tracking-wide">試合設定 (No.{matchId.replace('m', '')})</h3>
                            <button onClick={onClose} className="text-xl leading-none opacity-80 hover:opacity-100">&times;</button>
                        </div>
                        
                        <div className="p-4 space-y-4">
                            <div className="flex gap-3">
                                <div className="flex-1">
                                    <label className="block text-xs font-bold text-slate-500 mb-1">開始時間</label>
                                    <input type="time" value={data.time} onChange={e => setData({...data, time: e.target.value})} className="w-full border rounded px-2 py-1.5 focus:ring-2 outline-none"/>
                                </div>
                                <div className="flex-1">
                                    <label className="block text-xs font-bold text-slate-500 mb-1">役員/審判</label>
                                    <input type="text" value={data.official} onChange={e => setData({...data, official: e.target.value})} className="w-full border rounded px-2 py-1.5 focus:ring-2 outline-none"/>
                                </div>
                            </div>

                            <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <div className="flex font-bold text-[11px] text-slate-500 mb-2 border-b border-slate-200 pb-1">
                                    <div className="w-2/5">チーム名</div>
                                    <div className="w-1/5 text-center">前半</div>
                                    <div className="w-1/5 text-center">後半</div>
                                    <div className="w-1/5 text-center">合計</div>
                                </div>
                                
                                {['p1', 'p2'].map((p, idx) => (
                                    <div key={p} className={`flex items-center ${idx===0 ? 'mb-2' : ''}`}>
                                        <div className="w-2/5 pr-2">
                                            <input type="text" value={data[p]} onChange={e => setData({...data, [p]: e.target.value})} className="w-full border rounded px-1.5 py-1 text-sm font-bold shadow-sm focus:ring-2 outline-none"/>
                                        </div>
                                        <div className="w-1/5 px-0.5"><input type="tel" maxLength={2} value={data[`s${idx+1}`].f} onChange={e => handleScore(`s${idx+1}`, 'f', e.target.value)} className="w-full border rounded text-center py-1 font-bold shadow-sm outline-none focus:bg-blue-50"/></div>
                                        <div className="w-1/5 px-0.5"><input type="tel" maxLength={2} value={data[`s${idx+1}`].s} onChange={e => handleScore(`s${idx+1}`, 's', e.target.value)} className="w-full border rounded text-center py-1 font-bold shadow-sm outline-none focus:bg-blue-50"/></div>
                                        <div className="w-1/5 text-center font-black text-lg text-slate-800">{data[`s${idx+1}`].t || '-'}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="pt-2">
                                <p className="text-[11px] font-bold text-slate-500 mb-1">勝敗の手動決定（PTや棄権の場合など）</p>
                                <div className="flex gap-2">
                                    <button className={`flex-1 py-1.5 rounded border text-sm font-bold transition-colors ${manualWinner === 'p1' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600'}`} onClick={() => setManualWinner(manualWinner === 'p1' ? null : 'p1')}>{data.p1 || '上'} 勝</button>
                                    <button className={`flex-1 py-1.5 rounded border text-sm font-bold transition-colors ${manualWinner === 'p2' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600'}`} onClick={() => setManualWinner(manualWinner === 'p2' ? null : 'p2')}>{data.p2 || '下'} 勝</button>
                                </div>
                            </div>
                        </div>

                        <div className="p-3 bg-slate-50 border-t flex justify-end gap-2">
                            <button onClick={onClose} className="px-4 py-2 rounded text-sm font-bold text-slate-600 bg-white border hover:bg-slate-100">キャンセル</button>
                            <button onClick={save} className="px-5 py-2 rounded text-sm font-bold text-white bg-slate-800 hover:bg-slate-700">保存して閉じる</button>
                        </div>
                    </div>
                </div>
            );
        };

        // === メインアプリケーション ===
        const App = () => {
            const [info, setInfo] = useState({
                title: "大会名を入力してください",
                date: "令和 年 月 日()",
                venue: "試合会場を入力",
                manager: "",
                teamCount: 8
            });
            const [matches, setMatches] = useState(() => buildTournamentTree(8));
            const [editingId, setEditingId] = useState(null);

            // ロード & セーブ
            useEffect(() => {
                const savedInfo = localStorage.getItem('hb_info_v3');
                const savedMatches = localStorage.getItem('hb_matches_v3');
                if (savedInfo && savedMatches) {
                    setInfo(JSON.parse(savedInfo));
                    setMatches(JSON.parse(savedMatches));
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('hb_info_v3', JSON.stringify(info));
                localStorage.setItem('hb_matches_v3', JSON.stringify(matches));
            }, [info, matches]);

            // チーム数変更
            const handleTeamCount = (e) => {
                const val = parseInt(e.target.value);
                if (window.confirm(`${val}チームに変更します。現在入力されているすべての試合データがリセットされますがよろしいですか？`)) {
                    setInfo({ ...info, teamCount: val });
                    setMatches(buildTournamentTree(val));
                }
            };

            // 下流の勝敗をリセットする再帰関数
            const resetDownstream = (state, matchId) => {
                const m = state[matchId];
                if (m && m.winner) {
                    m.winner = null; m.loser = null;
                    if(m.nextMatch) { state[m.nextMatch][m.nextPos] = ''; resetDownstream(state, m.nextMatch); }
                    if(m.loserMatch) { state[m.loserMatch][m.loserPos] = ''; resetDownstream(state, m.loserMatch); }
                }
            };

            // 勝敗を確定して次へ進める
            const advanceTournament = (state, matchId, winnerSide) => {
                const match = state[matchId];
                if (!match.p1 || !match.p2) return state;

                const winnerName = winnerSide === 'p1' ? match.p1 : match.p2;
                const loserName = winnerSide === 'p1' ? match.p2 : match.p1;
                
                // 勝敗が変わった場合、または新たに決まった場合
                if (match.winner !== winnerName) {
                    match.winner = winnerName;
                    match.loser = loserName;
                    
                    if (match.nextMatch) {
                        state[match.nextMatch][match.nextPos] = winnerName;
                        resetDownstream(state, match.nextMatch);
                    }
                    if (match.loserMatch) {
                        state[match.loserMatch][match.loserPos] = loserName;
                        resetDownstream(state, match.loserMatch);
                    }
                }
                return state;
            };

            const handleModalSave = (matchId, updatedData, winnerSide) => {
                setMatches(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    next[matchId] = { ...next[matchId], ...updatedData };
                    
                    if (winnerSide) {
                        return advanceTournament(next, matchId, winnerSide);
                    } else {
                        // 勝敗が取り消された場合
                        next[matchId].winner = null;
                        next[matchId].loser = null;
                        if(next[matchId].nextMatch) { next[next[matchId].nextMatch][next[matchId].nextPos] = ''; resetDownstream(next, next[matchId].nextMatch); }
                        if(next[matchId].loserMatch) { next[next[matchId].loserMatch][next[matchId].loserPos] = ''; resetDownstream(next, next[matchId].loserMatch); }
                        return next;
                    }
                });
                setEditingId(null);
            };

            // 描画用の座標計算
            const { coords, lines, containerSize } = useMemo(() => {
                const c = calculateCoords(info.teamCount);
                const l = [];
                const rounds = Math.log2(info.teamCount);
                
                let prevStart = 1, prevCount = info.teamCount / 2, currId = info.teamCount / 2 + 1;
                
                for (let r = 1; r < rounds; r++) {
                    const currCount = prevCount / 2;
                    for (let i = 0; i < currCount; i++) {
                        const p1 = `m${prevStart + i * 2}`;
                        const p2 = `m${prevStart + i * 2 + 1}`;
                        const next = `m${currId}`;
                        
                        l.push(<BracketLine key={`${p1}-${next}`} x1={c[p1].x + CARD_W} y1={c[p1].y + MID_Y_OFFSET} x2={c[next].x} y2={c[next].y + P1_Y_OFFSET} />);
                        l.push(<BracketLine key={`${p2}-${next}`} x1={c[p2].x + CARD_W} y1={c[p2].y + MID_Y_OFFSET} x2={c[next].x} y2={c[next].y + P2_Y_OFFSET} />);
                        currId++;
                    }
                    prevStart += prevCount;
                    prevCount = currCount;
                }

                const width = rounds * (CARD_W + GAP_X) + CARD_W + 20;
                const height = c[`m${info.teamCount}`].y + CARD_H + 40;

                return { coords: c, lines: l, containerSize: { width, height } };
            }, [info.teamCount]);

            // 試合カードUI
            const MatchCard = ({ id, label, match }) => {
                const isFinal = label == info.teamCount - 1;
                const isThird = label == info.teamCount;
                
                return (
                    <div 
                        onClick={() => setEditingId(id)}
                        style={{ width: `${CARD_W}px`, height: `${CARD_H}px` }} 
                        className={`bg-white border-[2px] rounded overflow-hidden shadow-sm flex flex-col z-10 relative cursor-pointer hover:border-slate-400 hover:shadow transition-all ${isFinal ? 'border-amber-400' : 'border-slate-300'}`}
                    >
                        {isFinal && <div className="absolute -top-4 left-0 w-full text-center text-[10px] font-black text-amber-600 tracking-widest no-print">FINAL</div>}
                        {isThird && <div className="absolute -top-4 left-0 w-full text-center text-[10px] font-black text-slate-500 tracking-widest no-print">3rd PLACE</div>}
                        
                        <div className="h-[20px] bg-slate-100 border-b border-slate-200 px-1.5 flex justify-between items-center text-[9px] font-bold text-slate-500">
                            <span>{match.time} (No.{label})</span>
                            <span>役: {match.official}</span>
                        </div>
                        
                        {[1, 2].map(num => {
                            const side = `p${num}`;
                            const isWin = match.winner && match.winner === match[side];
                            const isLose = match.winner && match.winner !== match[side];
                            const s = match[`s${num}`];
                            
                            return (
                                <div key={num} className={`h-[29px] flex items-center px-1.5 transition-colors ${num===2 ? 'border-t border-slate-200' : ''} ${isWin ? 'bg-blue-50' : isLose ? 'bg-slate-50 opacity-60' : 'bg-white'}`}>
                                    <div className={`flex-1 text-[12px] truncate ${isWin ? 'font-black text-blue-800' : 'font-bold text-slate-800'}`}>{match[side] || <span className="text-slate-300 font-normal">未定</span>}</div>
                                    <div className="w-[36px] text-center text-[9px] text-slate-400 font-bold tracking-tighter">
                                        {(s.f || s.s) ? `${s.f || 0}-${s.s || 0}` : ''}
                                    </div>
                                    <div className={`w-[24px] text-right text-[14px] ${isWin ? 'font-black text-blue-800' : 'font-bold text-slate-800'}`}>
                                        {s.t}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* ===== ヘッダー部（設定・印刷） ===== */}
                    <div className="bg-slate-800 text-white py-4 px-4 shadow-md no-print">
                        <div className="max-w-[900px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <h1 className="text-lg font-black tracking-widest">トーナメント結果管理</h1>
                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="bg-white text-slate-800 px-5 py-2 rounded text-sm font-bold shadow hover:bg-slate-100 transition">A4 印刷</button>
                                <button onClick={() => { if(window.confirm("全データを消去しますか？")) { setMatches(buildTournamentTree(info.teamCount)); setInfo({...info, manager: "", title: "", date: "", venue: ""}) } }} className="border border-slate-600 text-slate-300 px-3 py-2 rounded text-sm font-bold hover:bg-slate-700">リセット</button>
                            </div>
                        </div>
                    </div>

                    <div className={`max-w-[900px] mx-auto p-4 md:p-6 print:p-0 print:max-w-none`}>
                        
                        {/* ===== 大会情報入力エリア ===== */}
                        <div className="bg-white p-5 rounded-lg shadow-sm mb-6 border border-slate-200 print-wrapper print:mb-4">
                            <input 
                                type="text" 
                                value={info.title} 
                                onChange={e => setInfo({...info, title: e.target.value})} 
                                placeholder="大会名を入力"
                                className="w-full text-xl md:text-2xl font-black text-center text-slate-900 border-b-2 border-slate-200 focus:border-slate-800 outline-none pb-2 mb-4 print-input-clean"
                            />
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm font-bold text-slate-600">
                                <div className="flex items-center gap-2 border-b border-slate-100 pb-1 print-input-clean">
                                    <span className="w-16 shrink-0">日時：</span>
                                    <input type="text" value={info.date} onChange={e => setInfo({...info, date: e.target.value})} className="w-full outline-none text-slate-900 print-input-clean" placeholder="令和○年○月○日" />
                                </div>
                                <div className="flex items-center gap-2 border-b border-slate-100 pb-1 print-input-clean">
                                    <span className="w-16 shrink-0">会場：</span>
                                    <input type="text" value={info.venue} onChange={e => setInfo({...info, venue: e.target.value})} className="w-full outline-none text-slate-900 print-input-clean" placeholder="体育館名など" />
                                </div>
                                <div className="flex justify-between items-center gap-2 pb-1">
                                    <div className="flex items-center gap-2 border-b border-slate-100 flex-1 print-input-clean">
                                        <span className="shrink-0 text-[11px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 print:bg-transparent print:p-0">責任者</span>
                                        <input type="text" value={info.manager} onChange={e => setInfo({...info, manager: e.target.value})} className="w-full outline-none text-slate-900 print-input-clean" placeholder="氏名" />
                                    </div>
                                    <div className="no-print shrink-0">
                                        <select value={info.teamCount} onChange={handleTeamCount} className="border border-slate-300 rounded px-2 py-1 outline-none text-slate-800 bg-white shadow-sm cursor-pointer">
                                            <option value={4}>4チーム</option>
                                            <option value={8}>8チーム</option>
                                            <option value={16}>16チーム</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* ===== トーナメントツリー描画エリア ===== */}
                        {/* 印刷用スケールクラスをチーム数に応じて付与 */}
                        <div className={`bg-white rounded-lg shadow-sm border border-slate-200 p-6 overflow-x-auto print-wrapper scale-${info.teamCount}`}>
                            <div className="text-[10px] text-slate-400 font-bold mb-4 no-print flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-2 rounded-md border border-blue-100 max-w-max">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                試合カードをタップして「チーム名」「スコア」「時間」を入力してください。
                            </div>

                            <div className="relative mx-auto print:mx-0" style={{ width: containerSize.width, height: containerSize.height }}>
                                <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', zIndex: 0 }}>
                                    {lines}
                                </svg>
                                
                                {Object.values(matches).map(m => {
                                    const num = m.id.replace('m', '');
                                    const isFinal = num == info.teamCount - 1;
                                    const isThird = num == info.teamCount;
                                    
                                    return (
                                        <div key={m.id} className="absolute" style={{ left: coords[m.id].x, top: coords[m.id].y }}>
                                            {isFinal && <div className="hidden print:block absolute -top-4 left-0 w-full text-center text-[10px] font-black text-black tracking-widest">決勝戦</div>}
                                            {isThird && <div className="hidden print:block absolute -top-4 left-0 w-full text-center text-[10px] font-black text-black tracking-widest">3位決定戦</div>}
                                            <MatchCard id={m.id} label={num} match={m} />
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* モーダル表示 */}
                    {editingId && (
                        <MatchEditModal 
                            matchId={editingId} 
                            matchData={matches[editingId]} 
                            onClose={() => setEditingId(null)} 
                            onSave={handleModalSave} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
