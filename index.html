<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会トーナメント</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f8fafc;
}

/* 横スクロールUX改善 */
.scroll-x {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 10px;
}

.scroll-x::-webkit-scrollbar {
  height: 6px;
}
.scroll-x::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 3px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const INITIAL = {
  m1:{p1:"浦西",p2:"松島"}, m2:{p1:"昭薬",p2:"ITS"},
  m3:{p1:"コラソン",p2:"港川"}, m4:{p1:"石田",p2:"浦添"},
  m7:{p1:"1勝者",p2:"2勝者"}, m8:{p1:"3勝者",p2:"4勝者"},
  m11:{p1:"7勝者",p2:"8勝者"}
};

const POS = {
  m1:{x:0,y:0}, m2:{x:0,y:140},
  m3:{x:0,y:320}, m4:{x:0,y:460},
  m7:{x:280,y:70}, m8:{x:280,y:390},
  m11:{x:560,y:230}
};

const Match = ({data}) => (
  <div className="w-[220px] bg-white border rounded shadow text-sm">
    <div className="bg-slate-100 px-2 text-[10px] flex justify-between">
      <span>試合</span><span>VS</span>
    </div>
    <div className="p-2">{data.p1}</div>
    <div className="border-t p-2">{data.p2}</div>
  </div>
);

const Lines = () => (
  <svg className="absolute inset-0 w-full h-full pointer-events-none">
    <g stroke="#94a3b8" strokeWidth="2" fill="none">
      <path d="M220 62 L250 62 L250 202 L220 202" />
      <path d="M250 132 L280 132" />
      <path d="M220 382 L250 382 L250 522 L220 522" />
      <path d="M250 452 L280 452" />
      <path d="M500 132 L530 132 L530 292 L560 292" />
      <path d="M500 452 L530 452 L530 292" />
    </g>
  </svg>
);

function App() {
  const [data] = useState(INITIAL);

  return (
    <div className="p-4">

      {/* タイトル */}
      <h1 className="text-lg font-bold mb-2">
        トーナメント表
      </h1>

      {/* スクロールヒント */}
      <p className="text-xs text-slate-400 mb-2">
        ← 横にスクロールできます →
      </p>

      {/* 横スクロールエリア */}
      <div className="scroll-x">
        
        {/* 固定幅キャンバス */}
        <div className="relative w-[800px] h-[600px]">

          <Lines />

          {Object.entries(POS).map(([id,pos])=>(
            <div key={id}
              className="absolute"
              style={{left:pos.x, top:pos.y}}>
              <Match data={data[id]} />
            </div>
          ))}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
