<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Noto Sans JP', sans-serif; background:#f8fafc; }
.scroll-x { overflow-x:auto; }

@media print {
  @page { size:A4 portrait; margin:10mm; }
  .no-print { display:none; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ===== 初期データ（時間＋オフィシャル含む） ===== */
const INITIAL = {
  m1:{p1:"浦西",p2:"松島",s1:"",s2:"",time:"9:00",off:"石田"},
  m2:{p1:"昭薬",p2:"ITS",s1:"",s2:"",time:"9:30",off:"松島"},
  m3:{p1:"コラソン",p2:"港川",s1:"",s2:"",time:"10:00",off:"ITS"},
  m4:{p1:"石田",p2:"浦添",s1:"",s2:"",time:"10:30",off:"港川"},
  m5:{p1:"1敗者",p2:"2敗者",time:"11:00",off:"浦添"},
  m6:{p1:"3敗者",p2:"4敗者",time:"11:30",off:"5勝者"},
  m7:{p1:"1勝者",p2:"2勝者",time:"12:00",off:"6勝者"},
  m8:{p1:"3勝者",p2:"4勝者",time:"12:30",off:"浦西"},
  m9:{p1:"5勝者",p2:"6勝者",time:"13:00",off:"8敗者"},
  m10:{p1:"7敗者",p2:"8敗者",time:"13:30",off:"9勝者"},
  m11:{p1:"7勝者",p2:"8勝者",time:"14:00",off:"10敗者"}
};

const getWinner = m=>{
  if(m.s1===""||m.s2==="") return null;
  return Number(m.s1)>Number(m.s2)?"p1":"p2";
};

function App(){

const [data,setData]=useState(
  JSON.parse(localStorage.getItem("tournament"))||INITIAL
);

useEffect(()=>{
  localStorage.setItem("tournament",JSON.stringify(data));
},[data]);

const update=(id,side,val)=>{
  const next={...data,[id]:{...data[id],[side]:val}};
  const m=next[id];
  const w=getWinner(m);

  if(w){
    if(id==="m1"){next.m5.p1=m.p2;next.m7.p1=m[w];}
    if(id==="m2"){next.m5.p2=m.p1;next.m7.p2=m[w];}
    if(id==="m3"){next.m6.p1=m.p2;next.m8.p1=m[w];}
    if(id==="m4"){next.m6.p2=m.p1;next.m8.p2=m[w];}
    if(id==="m5") next.m9.p1=m[w];
    if(id==="m6") next.m9.p2=m[w];
    if(id==="m7"){next.m10.p1=m.p1===m[w]?m.p2:m.p1;next.m11.p1=m[w];}
    if(id==="m8"){next.m10.p2=m.p1===m[w]?m.p2:m.p1;next.m11.p2=m[w];}
  }

  setData(next);
};

/* ===== カード ===== */
const Card=(id)=>{
  const m=data[id];
  const win=getWinner(m);

  return (
    <div className="w-[180px] bg-white border shadow text-xs">
      <div className="bg-gray-100 text-[10px] px-1 flex justify-between">
        <span>{m.time}</span>
        <span>オフィシャル:{m.off}</span>
      </div>

      {[1,2].map(n=>{
        const side=`p${n}`;
        const isWin = win && m[side]===m[win];

        return (
          <div key={n}
            className={`flex border-t ${isWin?"bg-blue-100 font-bold":"bg-white"}`}>
            <div className="flex-1 px-1">{m[side]}</div>
            <input
              type="number"
              value={m[`s${n}`]||""}
              onChange={e=>update(id,`s${n}`,e.target.value)}
              className="w-10 border-l text-center"
            />
          </div>
        );
      })}
    </div>
  );
};

/* ===== 描画 ===== */
return (
<div className="p-3">

{/* タイトル */}
<div className="text-center mb-3">
<h1 className="font-bold text-lg">
令和7年度 浦添・那覇地区中学生春季ハンドボール大会
</h1>
<div className="font-bold">【女子の部】</div>
</div>

{/* トーナメント */}
<div className="scroll-x">
<div className="relative w-[800px] h-[500px]">

{/* ===== 線 ===== */}
<svg className="absolute inset-0 w-full h-full">
  <g stroke="#94a3b8" strokeWidth="2" fill="none">
    <path d="M180 50 L220 50 L220 130 L180 130"/>
    <path d="M180 230 L220 230 L220 310 L180 310"/>
    <path d="M400 130 L440 130 L440 230"/>
  </g>
</svg>

{/* 1回戦 */}
<div style={{position:"absolute",left:0,top:20}}>{Card("m1")}</div>
<div style={{position:"absolute",left:0,top:100}}>{Card("m2")}</div>
<div style={{position:"absolute",left:0,top:220}}>{Card("m3")}</div>
<div style={{position:"absolute",left:0,top:300}}>{Card("m4")}</div>

{/* 敗者 */}
<div style={{position:"absolute",left:0,top:160}}>{Card("m5")}</div>
<div style={{position:"absolute",left:0,top:380}}>{Card("m6")}</div>

{/* 準決勝 */}
<div style={{position:"absolute",left:220,top:80}}>{Card("m7")}</div>
<div style={{position:"absolute",left:220,top:260}}>{Card("m8")}</div>

{/* 敗者戦 */}
<div style={{position:"absolute",left:220,top:180}}>{Card("m9")}</div>

{/* 決勝 */}
<div style={{position:"absolute",left:450,top:160}}>{Card("m11")}</div>

{/* 3位 */}
<div style={{position:"absolute",left:450,top:320}}>{Card("m10")}</div>

</div>
</div>

{/* ボタン */}
<div className="no-print mt-3 flex gap-2">
<button onClick={()=>window.print()} className="bg-black text-white px-3 py-1">
印刷
</button>
<button onClick={()=>setData(INITIAL)} className="border px-3 py-1">
リセット
</button>
</div>

{/* 署名 */}
<div className="mt-4 text-right font-bold">
会場責任者：＿＿＿＿＿＿＿＿
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
