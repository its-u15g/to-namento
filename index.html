<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会結果報告</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Noto Sans JP', sans-serif; background:#f8fafc; }

/* 横スクロール */
.scroll-x {
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.scroll-x::-webkit-scrollbar { height:6px; }
.scroll-x::-webkit-scrollbar-thumb {
  background:#cbd5e1; border-radius:3px;
}

/* 印刷 */
@media print {
  @page { size:A4 portrait; margin:10mm; }
  body { background:white; }
  .no-print { display:none !important; }
  .print-wrapper {
    transform:scale(0.94);
    transform-origin:top center;
  }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ===== 初期データ ===== */
const INITIAL_STATE = {
  m1:{p1:"浦西",p2:"松島",s1:"",s2:"",winner:null,loser:null,time:"9:00",official:"石田"},
  m2:{p1:"昭薬",p2:"ITS",s1:"",s2:"",winner:null,loser:null,time:"9:30",official:"松島"},
  m3:{p1:"コラソン",p2:"港川",s1:"",s2:"",winner:null,loser:null,time:"10:00",official:"ITS"},
  m4:{p1:"石田",p2:"浦添",s1:"",s2:"",winner:null,loser:null,time:"10:30",official:"港川"},
  m5:{p1:"1敗者",p2:"2敗者",s1:"",s2:"",winner:null,time:"11:00",official:"浦添"},
  m6:{p1:"3敗者",p2:"4敗者",s1:"",s2:"",winner:null,time:"11:30",official:"5の勝者"},
  m7:{p1:"1勝者",p2:"2勝者",s1:"",s2:"",winner:null,loser:null,time:"12:00",official:"6の勝者"},
  m8:{p1:"3勝者",p2:"4勝者",s1:"",s2:"",winner:null,loser:null,time:"12:30",official:"浦西"},
  m9:{p1:"5勝者",p2:"6勝者",s1:"",s2:"",winner:null,time:"13:00",official:"8の敗者"},
  m10:{p1:"7敗者",p2:"8敗者",s1:"",s2:"",winner:null,time:"13:30",official:"9の勝者"},
  m11:{p1:"7勝者",p2:"8勝者",s1:"",s2:"",winner:null,time:"14:00",official:"10の敗者"}
};

const isPlaceholder = n => !n || n.includes("勝者") || n.includes("敗者");

/* ===== 勝ち上がり ===== */
const setWinnerLogic = (data,id,side)=>{
  const next = JSON.parse(JSON.stringify(data));
  const m = next[id];

  const winner = side==="p1"?m.p1:m.p2;
  const loser  = side==="p1"?m.p2:m.p1;

  m.winner = winner;
  m.loser = loser;

  if(id==="m1"){next.m5.p1=loser;next.m7.p1=winner;}
  if(id==="m2"){next.m5.p2=loser;next.m7.p2=winner;}
  if(id==="m3"){next.m6.p1=loser;next.m8.p1=winner;}
  if(id==="m4"){next.m6.p2=loser;next.m8.p2=winner;}
  if(id==="m5"){next.m9.p1=winner;}
  if(id==="m6"){next.m9.p2=winner;}
  if(id==="m7"){next.m10.p1=loser;next.m11.p1=winner;}
  if(id==="m8"){next.m10.p2=loser;next.m11.p2=winner;}

  return next;
};

/* ===== UI ===== */
const Match = ({id,data,setData,isFinal})=>{

  const updateScore = (side,val)=>{
    const next = {...data,[`s${side}`]:val};
    
    // 自動勝者
    if(next.s1!=="" && next.s2!==""){
      const win = Number(next.s1) > Number(next.s2) ? "p1":"p2";
      setData(prev=>setWinnerLogic({...prev,[id]:next},id,win));
      return;
    }

    setData(prev=>({...prev,[id]:next}));
  };

  return (
    <div className={`w-[220px] bg-white border rounded shadow text-sm ${isFinal?"border-blue-500 scale-105":""}`}>
      
      <div className="bg-slate-100 px-2 text-[10px] flex justify-between">
        <span>{data.time}</span>
        <span>No.{id.replace("m","")}</span>
      </div>

      {[1,2].map(n=>{
        const side=`p${n}`;
        const win=data.winner===data[side];

        return(
          <div key={n}
            className={`flex items-center ${win?"bg-blue-100 border-l-4 border-blue-500 font-bold":""}`}>
            
            <div className="flex-1 px-2 truncate">
              {data[side]}
            </div>

            <input
              type="number"
              value={data[`s${n}`]}
              onChange={e=>updateScore(n,e.target.value)}
              className="w-12 text-center border-l"
            />
          </div>
        );
      })}

      <div className="text-[9px] text-right px-2 text-slate-400">
        審判: {data.official}
      </div>
    </div>
  );
};

/* ===== 線 ===== */
const Lines = ()=>(
<svg className="absolute inset-0 w-full h-full pointer-events-none">
<g stroke="#94a3b8" strokeWidth="2" fill="none">
<path d="M220 62 L250 62 L250 202 L220 202"/>
<path d="M250 132 L280 132"/>
<path d="M220 382 L250 382 L250 522 L220 522"/>
<path d="M250 452 L280 452"/>
<path d="M500 132 L530 132 L530 292 L560 292"/>
<path d="M500 452 L530 452 L530 292"/>
</g>
</svg>
);

/* ===== 座標 ===== */
const POS={
m1:{x:0,y:0},m2:{x:0,y:140},
m3:{x:0,y:320},m4:{x:0,y:460},
m7:{x:280,y:70},m8:{x:280,y:390},
m11:{x:560,y:230},m10:{x:560,y:460},
m5:{x:0,y:700},m6:{x:0,y:840},m9:{x:280,y:770}
};

/* ===== APP ===== */
function App(){

  const [matches,setMatches]=useState(
    JSON.parse(localStorage.getItem("tournament"))||INITIAL_STATE
  );

  const [manager,setManager]=useState("（氏名を記入）");

  useEffect(()=>{
    localStorage.setItem("tournament",JSON.stringify(matches));
  },[matches]);

  return(
  <div className="p-4">

    {/* ヘッダー */}
    <div className="no-print mb-4">
      <h1 className="text-xl font-bold">
        令和7年度 浦添・那覇地区中学生春季ハンドボール大会
      </h1>

      <div className="flex gap-2 mt-2">
        <button onClick={()=>window.print()}
          className="bg-black text-white px-4 py-1 rounded">
          印刷
        </button>

        <button onClick={()=>{
          if(confirm("リセットしますか？")){
            setMatches(INITIAL_STATE);
          }
        }}
        className="border px-4 py-1 rounded">
          リセット
        </button>
      </div>
    </div>

    {/* スクロール */}
    <div className="scroll-x">
      <div className="min-w-[840px]">

        <div className="print-wrapper bg-white p-4 border">

          <Lines/>

          <div className="relative w-[800px] h-[1000px]">

            {Object.entries(POS).map(([id,pos])=>(
              <div key={id}
                className="absolute"
                style={{left:pos.x,top:pos.y}}>
                <Match
                  id={id}
                  data={matches[id]}
                  setData={setMatches}
                  isFinal={id==="m11"}
                />
              </div>
            ))}

          </div>

          {/* 署名 */}
          <div className="mt-10 text-right font-bold border-t pt-2">
            会場責任者：{manager}
          </div>

        </div>
      </div>
    </div>

  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
