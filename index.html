<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会結果報告</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Noto Sans JP', sans-serif;
    background:#f1f5f9;
}

/* 横スクロール */
.scroll-x {
    overflow-x:auto;
}

/* 印刷 */
@media print {
    @page { size:A4 portrait; margin:10mm; }

    body { background:white; }

    .no-print { display:none; }

    .print-wrapper {
        transform:scale(0.88);
        transform-origin:top center;
    }
}

/* number矢印削除 */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance:none;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const INITIAL = {
m1:{p1:"浦西",p2:"松島",s1:"",s2:"",winner:null,time:"9:00",official:"石田"},
m2:{p1:"昭薬",p2:"ITS",s1:"",s2:"",winner:null,time:"9:30",official:"松島"},
m3:{p1:"コラソン",p2:"港川",s1:"",s2:"",winner:null,time:"10:00",official:"ITS"},
m4:{p1:"石田",p2:"浦添",s1:"",s2:"",winner:null,time:"10:30",official:"港川"},
m5:{p1:"1敗者",p2:"2敗者",s1:"",s2:"",winner:null,time:"11:00",official:"浦添"},
m6:{p1:"3敗者",p2:"4敗者",s1:"",s2:"",winner:null,time:"11:30",official:"5勝者"},
m7:{p1:"1勝者",p2:"2勝者",s1:"",s2:"",winner:null,time:"12:00",official:"6勝者"},
m8:{p1:"3勝者",p2:"4勝者",s1:"",s2:"",winner:null,time:"12:30",official:"浦西"},
m9:{p1:"5勝者",p2:"6勝者",s1:"",s2:"",winner:null,time:"13:00",official:"8敗者"},
m10:{p1:"7敗者",p2:"8敗者",s1:"",s2:"",winner:null,time:"13:30",official:"9勝者"},
m11:{p1:"7勝者",p2:"8勝者",s1:"",s2:"",winner:null,time:"14:00",official:"10敗者"}
};

const isPlaceholder = n => !n || n.includes("勝者") || n.includes("敗者");

const App = () => {

const [data,setData] = useState(INITIAL);

const setWinner = (id,side)=>{
const m=data[id];
if(isPlaceholder(m.p1)||isPlaceholder(m.p2))return;

const win = side==="p1"?m.p1:m.p2;
const lose = side==="p1"?m.p2:m.p1;

const next=JSON.parse(JSON.stringify(data));
next[id].winner=win;

if(id==="m1"){next.m5.p1=lose;next.m7.p1=win;}
if(id==="m2"){next.m5.p2=lose;next.m7.p2=win;}
if(id==="m3"){next.m6.p1=lose;next.m8.p1=win;}
if(id==="m4"){next.m6.p2=lose;next.m8.p2=win;}
if(id==="m5"){next.m9.p1=win;}
if(id==="m6"){next.m9.p2=win;}
if(id==="m7"){next.m10.p1=lose;next.m11.p1=win;}
if(id==="m8"){next.m10.p2=lose;next.m11.p2=win;}

setData(next);
};

const Score=(id,key,val)=>{
setData(prev=>({...prev,[id]:{...prev[id],[key]:val}}));
};

const Card=({id,label,m,final})=>{
const ready=!isPlaceholder(m.p1)&&!isPlaceholder(m.p2);

return(
<div className={`w-[190px] border-2 rounded bg-white shadow ${final?"border-red-400":"border-gray-300"}`}>
<div className="bg-slate-800 text-white text-[10px] flex justify-between px-2">
<span>No.{label} {m.time}</span>
<span>OF:{m.official}</span>
</div>

{["p1","p2"].map((p,i)=>{
const win=m.winner===m[p];
const lose=m.winner && !win;

return(
<div key={p} className={`flex h-[30px] ${win?"bg-blue-200":""} ${lose?"bg-gray-100 text-gray-400":""}`}>
<button onClick={()=>setWinner(id,p)} className="flex-1 text-left px-2 text-xs font-bold">
{m[p]}
</button>
<input type="number" value={m["s"+(i+1)]}
onChange={e=>Score(id,"s"+(i+1),e.target.value)}
className="w-10 text-center border-l"/>
</div>
);
})}
</div>
);
};

/* 座標 */
const X1=0,X2=260,X3=520;
const Y={m1:0,m2:100,m3:220,m4:320,m7:60,m8:260,m11:150,m10:300};

const Line=({x1,y1,x2,y2})=>{
const mx=(x1+x2)/2;
return <path d={`M${x1} ${y1} L${mx} ${y1} L${mx} ${y2} L${x2} ${y2}`} stroke="#334155" strokeWidth="2.5" fill="none"/>
};

return(
<div className="p-4">

<div className="no-print mb-4 flex gap-2">
<button onClick={()=>print()} className="bg-black text-white px-4 py-2">印刷</button>
<button onClick={()=>setData(INITIAL)} className="border px-4 py-2">リセット</button>
</div>

<div className="scroll-x">
<div className="print-wrapper bg-white p-6 w-[800px]">

<h1 className="text-center font-bold mb-4">
令和7年度 浦添・那覇地区中学生春季ハンドボール大会【女子の部】
</h1>

{/* メイン */}
<div className="relative h-[420px]">

<svg className="absolute w-full h-full">

<Line x1={190} y1={15} x2={260} y2={75}/>
<Line x1={190} y1={115} x2={260} y2={105}/>

<Line x1={190} y1={235} x2={260} y2={275}/>
<Line x1={190} y1={335} x2={260} y2={305}/>

<Line x1={450} y1={105} x2={520} y2={165}/>
<Line x1={450} y1={305} x2={520} y2={185}/>

</svg>

<div style={{position:"absolute",left:X1,top:Y.m1}}><Card id="m1" label="1" m={data.m1}/></div>
<div style={{position:"absolute",left:X1,top:Y.m2}}><Card id="m2" label="2" m={data.m2}/></div>
<div style={{position:"absolute",left:X1,top:Y.m3}}><Card id="m3" label="3" m={data.m3}/></div>
<div style={{position:"absolute",left:X1,top:Y.m4}}><Card id="m4" label="4" m={data.m4}/></div>

<div style={{position:"absolute",left:X2,top:Y.m7}}><Card id="m7" label="7" m={data.m7}/></div>
<div style={{position:"absolute",left:X2,top:Y.m8}}><Card id="m8" label="8" m={data.m8}/></div>

<div style={{position:"absolute",left:X3,top:Y.m11-20}}>
<div className="text-center text-red-600 text-xs font-bold">決勝戦</div>
<Card id="m11" label="11" m={data.m11} final/>
</div>

<div style={{position:"absolute",left:X3,top:Y.m10-20}}>
<div className="text-center text-gray-600 text-xs">3位決定戦</div>
<Card id="m10" label="10" m={data.m10}/>
</div>

</div>

{/* 敗者交流 */}
<div className="mt-10 border-t pt-6">

<h2 className="text-sm font-bold mb-2">敗者交流戦</h2>

<div className="flex gap-10">
<Card id="m5" label="5" m={data.m5}/>
<Card id="m6" label="6" m={data.m6}/>
<Card id="m9" label="9" m={data.m9}/>
</div>

</div>

</div>
</div>
</div>
);
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
