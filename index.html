<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会結果報告 | 令和7年度 浦添・那覇地区中学生春季ハンドボール大会</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a;
        }
        
        /* 印刷時の最適化設定 */
        @media print {
            @page { size: A4 portrait; margin: 12mm; }
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-wrapper { transform: scale(0.95); transform-origin: top center; box-shadow: none !important; border: none !important; }
        }

        /* 数値入力のスピンボタン（矢印）を隠す */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_STATE = {
            m1: { p1: "浦西", p2: "松島", s1: "", s2: "", winner: null, loser: null, time: "9:00", official: "石田" },
            m2: { p1: "昭薬", p2: "ITS", s1: "", s2: "", winner: null, loser: null, time: "9:30", official: "松島" },
            m3: { p1: "コラソン", p2: "港川", s1: "", s2: "", winner: null, loser: null, time: "10:00", official: "ITS" },
            m4: { p1: "石田", p2: "浦添", s1: "", s2: "", winner: null, loser: null, time: "10:30", official: "港川" },
            m5: { p1: "1敗者", p2: "2敗者", s1: "", s2: "", winner: null, time: "11:00", official: "浦添" },
            m6: { p1: "3敗者", p2: "4敗者", s1: "", s2: "", winner: null, time: "11:30", official: "5の勝者" },
            m7: { p1: "1勝者", p2: "2勝者", s1: "", s2: "", winner: null, loser: null, time: "12:00", official: "6の勝者" },
            m8: { p1: "3勝者", p2: "4勝者", s1: "", s2: "", winner: null, loser: null, time: "12:30", official: "浦西" },
            m9: { p1: "5勝者", p2: "6勝者", s1: "", s2: "", winner: null, time: "13:00", official: "8の敗者" },
            m10: { p1: "7敗者", p2: "8敗者", s1: "", s2: "", winner: null, time: "13:30", official: "9の勝者" },
            m11: { p1: "7勝者", p2: "8勝者", s1: "", s2: "", winner: null, time: "14:00", official: "10の敗者" }
        };

        const isPlaceholder = (name) => !name || name.includes("勝者") || name.includes("敗者");

        // チーム名の中央にピッタリ接続する美しいクランク線
        const BracketLine = ({ x1, y1, x2, y2 }) => {
            const midX = x1 + (x2 - x1) / 2;
            return (
                <path 
                    d={`M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`} 
                    fill="none" 
                    stroke="#94a3b8" /* スレートグレー（赤くしない） */
                    strokeWidth="2" 
                    strokeLinejoin="round" 
                />
            );
        };

        const App = () => {
            // ローカルストレージからの復元（自動保存機能）
            const [matches, setMatches] = useState(() => {
                const saved = localStorage.getItem('hb_tournament');
                return saved ? JSON.parse(saved) : INITIAL_STATE;
            });
            const [manager, setManager] = useState(() => localStorage.getItem('hb_manager') || "（氏名を記入）");

            // データが変更されるたびに保存
            useEffect(() => {
                localStorage.setItem('hb_tournament', JSON.stringify(matches));
                localStorage.setItem('hb_manager', manager);
            }, [matches, manager]);

            // 勝者確定ロジック（チーム名をタップで確定）
            const setWinner = (matchId, winnerSide) => {
                const match = matches[matchId];
                if (isPlaceholder(match.p1) || isPlaceholder(match.p2)) return;

                const winnerName = winnerSide === 'p1' ? match.p1 : match.p2;
                const loserName = winnerSide === 'p1' ? match.p2 : match.p1;

                const next = JSON.parse(JSON.stringify(matches));
                next[matchId].winner = winnerName;
                next[matchId].loser = loserName;

                if (matchId === 'm1') { next.m5.p1 = loserName; next.m7.p1 = winnerName; }
                if (matchId === 'm2') { next.m5.p2 = loserName; next.m7.p2 = winnerName; }
                if (matchId === 'm3') { next.m6.p1 = loserName; next.m8.p1 = winnerName; }
                if (matchId === 'm4') { next.m6.p2 = loserName; next.m8.p2 = winnerName; }
                if (matchId === 'm5') { next.m9.p1 = winnerName; }
                if (matchId === 'm6') { next.m9.p2 = winnerName; }
                if (matchId === 'm7') { next.m10.p1 = loserName; next.m11.p1 = winnerName; }
                if (matchId === 'm8') { next.m10.p2 = loserName; next.m11.p2 = winnerName; }

                setMatches(next);
            };

            const updateScore = (id, side, val) => {
                setMatches(prev => ({
                    ...prev,
                    [id]: { ...prev[id], [side]: val.slice(0, 3) }
                }));
            };

            const resetData = () => {
                if(window.confirm("すべての入力データをリセットしますか？\n（スコアと勝敗が消去されます）")) {
                    setMatches(INITIAL_STATE);
                }
            };

            // 洗練された試合カードデザイン
            const MatchCard = ({ id, label, match, isFinal = false }) => {
                const ready = !isPlaceholder(match.p1) && !isPlaceholder(match.p2);
                return (
                    <div className={`w-[200px] h-[90px] bg-white border-[2px] rounded-lg overflow-hidden shadow-sm flex flex-col z-10 relative transition-all ${isFinal ? 'border-amber-400 ring-2 ring-amber-100' : 'border-slate-300 hover:border-slate-400'}`}>
                        {/* ヘッダー部（時間・役） */}
                        <div className="h-[24px] bg-slate-50 border-b border-slate-200 px-2 flex justify-between items-center text-[10px] font-bold text-slate-500">
                            <span>{match.time} (No.{label})</span>
                            <span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-slate-200 text-[9px] text-slate-700">役: {match.official}</span>
                        </div>
                        
                        {/* チーム入力部 */}
                        {[1, 2].map(num => {
                            const side = `p${num}`;
                            const isWinner = match.winner === match[side];
                            const isPReady = !isPlaceholder(match[side]);
                            return (
                                <div key={num} className={`h-[32px] flex items-center transition-colors ${isWinner ? 'bg-slate-100' : ''} ${num === 2 ? 'border-t border-slate-200' : ''}`}>
                                    <button 
                                        onClick={() => setWinner(id, side)}
                                        disabled={!ready || !!match.winner}
                                        title={ready && !match.winner ? "タップして勝者を確定" : ""}
                                        className={`flex-1 text-left px-2 truncate outline-none transition-colors ${isPReady ? 'text-slate-800 font-bold text-[13px]' : 'text-slate-400 font-medium text-[12px]'} ${ready && !match.winner ? 'hover:text-blue-600 cursor-pointer' : 'cursor-default'}`}
                                    >
                                        {match[side]}
                                    </button>
                                    <input 
                                        type="number" 
                                        value={match[`s${num}`]} 
                                        onChange={(e) => updateScore(id, `s${num}`, e.target.value)}
                                        placeholder="-"
                                        className={`w-[40px] h-full border-l border-slate-200 text-center text-[14px] font-black focus:bg-blue-50 focus:text-blue-700 outline-none transition-colors ${isWinner ? 'text-slate-900 bg-slate-50' : 'text-slate-600'}`}
                                    />
                                </div>
                            );
                        })}
                    </div>
                );
            };

            // === 座標計算ロジック（カードの真ん中に線を繋ぐため） ===
            const CARD_W = 200;
            const CARD_H = 90;
            const COL_SPACE = 80;
            
            // X座標
            const X1 = 0;
            const X2 = X1 + CARD_W + COL_SPACE; // 280
            const X3 = X2 + CARD_W + COL_SPACE; // 560
            
            // Y座標（メイントーナメント）
            const M1_Y = 0;   const M2_Y = 120;
            const M3_Y = 260; const M4_Y = 380;
            const M7_Y = 60;  const M8_Y = 320;
            const M11_Y = 190;
            const M10_Y = 380; // 3位決定戦

            // チーム名（入力欄）のY座標（カードの上端からのオフセット）
            const P1_OFFSET = 24 + 16; // ヘッダー24px + チーム1(32px)の半分
            const P2_OFFSET = 24 + 32 + 16; // ヘッダー24px + チーム1(32px) + チーム2(32px)の半分
            const MID_OFFSET = CARD_H / 2; // カード全体の縦中央

            return (
                <div className="min-h-screen py-8 px-4 flex flex-col items-center">
                    
                    {/* ===== 操作・情報ヘッダー (印刷時は非表示) ===== */}
                    <div className="w-full max-w-[820px] mb-6 flex flex-col md:flex-row justify-between items-end gap-4 no-print border-b-2 border-slate-800 pb-4">
                        <div>
                            <h1 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight">令和7年度 浦添・那覇地区中学生春季ハンドボール大会</h1>
                            <div className="flex items-center gap-3 mt-2">
                                <span className="bg-slate-800 text-white px-3 py-1 rounded text-xs font-bold tracking-wider">女子の部</span>
                                <span className="text-slate-500 font-bold text-sm">結果管理システム</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-3">
                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="bg-slate-800 text-white px-6 py-2 rounded font-bold shadow-md hover:bg-slate-700 transition-colors flex items-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                    A4印刷 / PDF保存
                                </button>
                                <button onClick={resetData} className="bg-white text-slate-500 px-4 py-2 rounded border border-slate-300 font-bold hover:text-red-600 hover:border-red-200 transition-colors shadow-sm">
                                    リセット
                                </button>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-md border border-slate-200">
                                <label className="text-xs font-bold text-slate-600">会場責任者</label>
                                <input 
                                    type="text" 
                                    value={manager} 
                                    onChange={(e) => setManager(e.target.value)}
                                    className="bg-white border border-slate-300 px-2 py-1 rounded text-sm font-bold w-40 focus:ring-2 focus:ring-slate-400 focus:outline-none text-slate-800"
                                />
                            </div>
                        </div>
                    </div>

                    {/* ===== 印刷用タイトル (印刷時のみ表示) ===== */}
                    <div className="w-full max-w-[820px] hidden print:block text-center mb-6 border-b-2 border-slate-800 pb-4">
                        <h1 className="text-3xl font-black tracking-widest text-slate-900">大会結果報告</h1>
                        <p className="text-lg mt-2 font-bold text-slate-700">令和7年度 浦添・那覇地区中学生春季ハンドボール大会（女子の部）</p>
                        <div className="flex justify-between mt-4 text-sm font-bold text-slate-600 px-4">
                            <span>会場：浦西中学校 体育館</span>
                            <span>作成日：{new Date().toLocaleDateString('ja-JP')}</span>
                        </div>
                    </div>

                    {/* ===== トーナメント描画エリア ===== */}
                    <div className="w-full max-w-[820px] print-wrapper bg-white p-8 print:p-0 rounded-xl shadow-md print:shadow-none border border-slate-200 print:border-none">
                        
                        {/* --- メイントーナメント --- */}
                        <div className="relative mb-10">
                            <div className="flex items-center gap-2 mb-6 no-print">
                                <div className="w-1.5 h-4 bg-slate-800 rounded-full"></div>
                                <h2 className="text-sm font-black text-slate-700 tracking-widest">メイントーナメント</h2>
                            </div>
                            
                            <div className="relative w-[760px] h-[470px]">
                                {/* SVG線の描画レイヤー（最背面） */}
                                <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', zIndex: 0 }}>
                                    {/* M1, M2 -> M7 */}
                                    <BracketLine x1={X1 + CARD_W} y1={M1_Y + MID_OFFSET} x2={X2} y2={M7_Y + P1_OFFSET} />
                                    <BracketLine x1={X1 + CARD_W} y1={M2_Y + MID_OFFSET} x2={X2} y2={M7_Y + P2_OFFSET} />
                                    
                                    {/* M3, M4 -> M8 */}
                                    <BracketLine x1={X1 + CARD_W} y1={M3_Y + MID_OFFSET} x2={X2} y2={M8_Y + P1_OFFSET} />
                                    <BracketLine x1={X1 + CARD_W} y1={M4_Y + MID_OFFSET} x2={X2} y2={M8_Y + P2_OFFSET} />
                                    
                                    {/* M7, M8 -> M11 (決勝) */}
                                    <BracketLine x1={X2 + CARD_W} y1={M7_Y + MID_OFFSET} x2={X3} y2={M11_Y + P1_OFFSET} />
                                    <BracketLine x1={X2 + CARD_W} y1={M8_Y + MID_OFFSET} x2={X3} y2={M11_Y + P2_OFFSET} />
                                </svg>

                                {/* カードの配置 */}
                                <div className="absolute" style={{ left: X1, top: M1_Y }}><MatchCard id="m1" label="1" match={matches.m1} /></div>
                                <div className="absolute" style={{ left: X1, top: M2_Y }}><MatchCard id="m2" label="2" match={matches.m2} /></div>
                                <div className="absolute" style={{ left: X1, top: M3_Y }}><MatchCard id="m3" label="3" match={matches.m3} /></div>
                                <div className="absolute" style={{ left: X1, top: M4_Y }}><MatchCard id="m4" label="4" match={matches.m4} /></div>

                                <div className="absolute" style={{ left: X2, top: M7_Y }}><MatchCard id="m7" label="7" match={matches.m7} /></div>
                                <div className="absolute" style={{ left: X2, top: M8_Y }}><MatchCard id="m8" label="8" match={matches.m8} /></div>

                                <div className="absolute" style={{ left: X3, top: M11_Y - 24 }}>
                                    <div className="text-[11px] font-black text-amber-600 mb-1 text-center tracking-widest bg-amber-50 rounded-t-md py-0.5 border border-amber-200 border-b-0">決勝戦</div>
                                    <MatchCard id="m11" label="11" match={matches.m11} isFinal={true} />
                                </div>
                                <div className="absolute" style={{ left: X3, top: M10_Y - 24 }}>
                                    <div className="text-[11px] font-bold text-slate-500 mb-1 text-center tracking-widest bg-slate-100 rounded-t-md py-0.5 border border-slate-200 border-b-0">3位決定戦</div>
                                    <MatchCard id="m10" label="10" match={matches.m10} />
                                </div>
                            </div>
                        </div>

                        {/* --- 敗者交流戦 --- */}
                        <div className="relative mt-4 pt-6 border-t-2 border-dashed border-slate-200">
                            <div className="flex items-center gap-2 mb-6 no-print">
                                <div className="w-1.5 h-4 bg-slate-400 rounded-full"></div>
                                <h2 className="text-sm font-black text-slate-500 tracking-widest">敗者交流戦</h2>
                            </div>
                            
                            <div className="relative w-[480px] h-[210px]">
                                <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', zIndex: 0 }}>
                                    {/* M5, M6 -> M9 */}
                                    <BracketLine x1={X1 + CARD_W} y1={0 + MID_OFFSET} x2={X2} y2={60 + P1_OFFSET} />
                                    <BracketLine x1={X1 + CARD_W} y1={120 + MID_OFFSET} x2={X2} y2={60 + P2_OFFSET} />
                                </svg>

                                <div className="absolute" style={{ left: X1, top: 0 }}><MatchCard id="m5" label="5" match={matches.m5} /></div>
                                <div className="absolute" style={{ left: X1, top: 120 }}><MatchCard id="m6" label="6" match={matches.m6} /></div>
                                
                                <div className="absolute" style={{ left: X2, top: 60 - 24 }}>
                                    <div className="text-[11px] font-bold text-slate-500 mb-1 text-center tracking-widest bg-slate-100 rounded-t-md py-0.5 border border-slate-200 border-b-0">交流戦 決勝</div>
                                    <MatchCard id="m9" label="9" match={matches.m9} />
                                </div>
                            </div>
                        </div>

                        {/* ===== 署名欄（会場責任者のみ） ===== */}
                        <div className="mt-12 flex justify-end print:mt-16">
                            <div className="text-lg font-black text-slate-900 flex items-end gap-4 border-b-2 border-slate-800 pb-1 pr-8">
                                <span className="text-sm text-slate-600 mb-0.5">会場責任者：</span>
                                <span>{manager}</span>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
