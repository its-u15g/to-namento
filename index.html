<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大会結果管理 | 女子の部</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A4印刷設定 */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { -webkit-print-color-adjust: exact; background-color: white !important; }
            .no-print { display: none !important; }
            .bracket-container { display: block !important; overflow: visible !important; }
        }
        
        /* カスタムスクロールバー（スマホの横スクロールを滑らかに） */
        .overflow-x-auto {
            -webkit-overflow-scrolling: touch;
        }

        /* 数値入力の矢印を消す */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .match-card {
            transition: transform 0.1s ease;
        }
        .match-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVGアイコンコンポーネント
        const Icons = {
            Trophy: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0012 0V2z"/></svg>,
            Clock: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>,
            Print: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>,
            Reset: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
            Layout: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        };

        const INITIAL_STATE = {
            m1: { p1: "浦西", p2: "松島", s1: "", s2: "", winner: null, loser: null, time: "9:00", official: "石田" },
            m2: { p1: "昭薬", p2: "ITS", s1: "", s2: "", winner: null, loser: null, time: "9:30", official: "松島" },
            m3: { p1: "コラソン", p2: "港川", s1: "", s2: "", winner: null, loser: null, time: "10:00", official: "ITS" },
            m4: { p1: "石田", p2: "浦添", s1: "", s2: "", winner: null, loser: null, time: "10:30", official: "港川" },
            m5: { p1: null, p2: null, s1: "", s2: "", winner: null, time: "11:00", official: "浦添" },
            m6: { p1: null, p2: null, s1: "", s2: "", winner: null, time: "11:30", official: "5勝者" },
            m7: { p1: null, p2: null, s1: "", s2: "", winner: null, loser: null, time: "12:00", official: "6勝者" },
            m8: { p1: null, p2: null, s1: "", s2: "", winner: null, loser: null, time: "12:30", official: "浦西" },
            m9: { p1: null, p2: null, s1: "", s2: "", winner: null, time: "13:00", official: "8敗者" },
            m10: { p1: null, p2: null, s1: "", s2: "", winner: null, time: "13:30", official: "9勝者" },
            m11: { p1: null, p2: null, s1: "", s2: "", winner: null, time: "14:00", official: "10敗者" }
        };

        const App = () => {
            const [matches, setMatches] = useState(INITIAL_STATE);
            const [viewMode, setViewMode] = useState('list'); // 'list' or 'bracket'

            const updateScore = (matchId, side, value) => {
                setMatches(prev => ({
                    ...prev,
                    [matchId]: { ...prev[matchId], [side]: value.slice(0, 3) }
                }));
            };

            const setWinner = (matchId, winnerSide) => {
                const match = matches[matchId];
                if (!match.p1 || !match.p2) return;
                const winnerName = winnerSide === 'p1' ? match.p1 : match.p2;
                const loserName = winnerSide === 'p1' ? match.p2 : match.p1;

                const newMatches = JSON.parse(JSON.stringify(matches));
                newMatches[matchId].winner = winnerName;
                newMatches[matchId].loser = loserName;

                // 自動進捗ロジック
                if (matchId === 'm1') { newMatches.m5.p1 = loserName; newMatches.m7.p1 = winnerName; }
                if (matchId === 'm2') { newMatches.m5.p2 = loserName; newMatches.m7.p2 = winnerName; }
                if (matchId === 'm3') { newMatches.m6.p1 = loserName; newMatches.m8.p1 = winnerName; }
                if (matchId === 'm4') { newMatches.m6.p2 = loserName; newMatches.m8.p2 = winnerName; }
                if (matchId === 'm5') { newMatches.m9.p1 = winnerName; }
                if (matchId === 'm6') { newMatches.m9.p2 = winnerName; }
                if (matchId === 'm7') { newMatches.m10.p1 = loserName; newMatches.m11.p1 = winnerName; }
                if (matchId === 'm8') { newMatches.m10.p2 = loserName; newMatches.m11.p2 = winnerName; }

                setMatches(newMatches);
            };

            const MatchCard = ({ id, label, match, isFinal = false }) => (
                <div className={`match-card relative flex flex-col w-full sm:w-64 bg-white border rounded-xl shadow-sm overflow-hidden mb-4 print:mb-6 print:shadow-none print:border-slate-400 ${isFinal ? 'border-2 border-yellow-400 ring-2 ring-yellow-50' : 'border-slate-200'}`}>
                    <div className="bg-slate-50 border-b px-3 py-1.5 text-[11px] font-bold text-slate-600 flex justify-between items-center print:bg-white">
                        <span className="flex items-center gap-1.5"><Icons.Clock /> {match.time} (第{label}試合)</span>
                        <span className="bg-slate-200 px-2 py-0.5 rounded text-[10px] print:border">役: {match.official}</span>
                    </div>
                    
                    {[1, 2].map(num => {
                        const side = `p${num}`;
                        const scoreSide = `s${num}`;
                        const isWinner = match.winner === match[side];
                        return (
                            <div key={side} className={`flex items-center h-14 ${isWinner ? 'bg-blue-50' : ''} ${num === 2 ? 'border-t border-slate-100' : ''} transition-colors`}>
                                <button 
                                    onClick={() => setWinner(id, side)}
                                    disabled={!match.p1 || !match.p2 || !!match.winner}
                                    className={`flex-1 text-left px-4 text-base font-black truncate ${!match[side] ? 'text-slate-300 italic' : 'text-slate-900'} ${isWinner ? 'text-blue-700' : ''}`}
                                >
                                    {match[side] || "未定"}
                                </button>
                                <input 
                                    type="number" 
                                    inputMode="numeric"
                                    value={match[scoreSide]} 
                                    onChange={(e) => updateScore(id, scoreSide, e.target.value)}
                                    placeholder="0"
                                    className="w-16 h-full border-l border-slate-100 text-center text-xl font-black text-slate-700 focus:bg-yellow-50 focus:outline-none focus:ring-inset focus:ring-1 focus:ring-yellow-400"
                                />
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 py-3 flex flex-col sm:flex-row justify-between items-center no-print shadow-sm gap-3">
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            <div className="p-2 bg-yellow-100 rounded-lg text-yellow-600"><Icons.Trophy /></div>
                            <div>
                                <h1 className="font-black text-slate-900 text-base leading-tight">女子の部 結果管理</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Spring Tournament 2025</p>
                            </div>
                        </div>
                        
                        <div className="flex gap-2 w-full sm:w-auto justify-between sm:justify-end">
                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                <button onClick={() => setViewMode('list')} className={`px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-1.5 transition ${viewMode === 'list' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>
                                    <Icons.Layout /> リスト
                                </button>
                                <button onClick={() => setViewMode('bracket')} className={`px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-1.5 transition ${viewMode === 'bracket' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>
                                    <Icons.Trophy /> トーナメント
                                </button>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="bg-blue-600 text-white p-2.5 rounded-lg shadow-sm hover:bg-blue-700"><Icons.Print /></button>
                                <button onClick={() => confirm("リセットしますか？") && setMatches(INITIAL_STATE)} className="bg-white text-slate-400 p-2.5 rounded-lg border border-slate-200 hover:text-red-500"><Icons.Reset /></button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 sm:p-8 max-w-full mx-auto print:p-0">
                        {/* 印刷ヘッダー */}
                        <div className="hidden print:block text-center mb-8 border-b-2 border-slate-900 pb-4">
                            <h1 className="text-2xl font-black">大会結果報告書 (女子の部)</h1>
                            <div className="flex justify-between mt-4 text-xs font-bold">
                                <span>会場：浦西中学校体育館</span>
                                <span>作成日：{new Date().toLocaleDateString('ja-JP')}</span>
                            </div>
                        </div>

                        {/* 表示モード切り替えコンテンツ */}
                        {viewMode === 'list' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 no-print">
                                {Object.entries(matches).map(([id, m], idx) => (
                                    <div key={id}>
                                        <div className="mb-2 text-[10px] font-black text-slate-400 ml-1">MATCH {idx + 1}</div>
                                        <MatchCard id={id} label={id.replace('m','')} match={m} isFinal={id === 'm11'} />
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bracket-container overflow-x-auto pb-12 cursor-grab active:cursor-grabbing">
                                <div className="min-w-max flex flex-col gap-10">
                                    <section>
                                        <h2 className="text-xs font-black text-slate-400 mb-6 flex items-center gap-2"><Icons.Trophy /> MAIN TOURNAMENT</h2>
                                        <div className="flex items-start gap-8">
                                            {/* 1回戦 */}
                                            <div className="flex flex-col gap-4">
                                                <MatchCard id="m1" label="1" match={matches.m1} />
                                                <MatchCard id="m2" label="2" match={matches.m2} />
                                                <MatchCard id="m3" label="3" match={matches.m3} />
                                                <MatchCard id="m4" label="4" match={matches.m4} />
                                            </div>
                                            {/* 準決勝 */}
                                            <div className="flex flex-col gap-28 pt-12">
                                                <MatchCard id="m7" label="7" match={matches.m7} />
                                                <MatchCard id="m8" label="8" match={matches.m8} />
                                            </div>
                                            {/* 決勝 & 3位 */}
                                            <div className="flex flex-col gap-12 pt-28">
                                                <MatchCard id="m11" label="11" match={matches.m11} isFinal={true} />
                                                <div className="border-t border-slate-200 pt-8 mt-4">
                                                    <div className="text-[10px] font-bold text-slate-400 mb-2">3位決定戦</div>
                                                    <MatchCard id="m10" label="10" match={matches.m10} />
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                    
                                    <section className="bg-white/50 p-6 rounded-2xl border border-slate-200 max-w-fit">
                                        <h2 className="text-xs font-black text-slate-400 mb-6 flex items-center gap-2">敗者戦 (5-8位)</h2>
                                        <div className="flex gap-8">
                                            <div className="flex flex-col gap-4">
                                                <MatchCard id="m5" label="5" match={matches.m5} />
                                                <MatchCard id="m6" label="6" match={matches.m6} />
                                            </div>
                                            <div className="pt-12">
                                                <MatchCard id="m9" label="9" match={matches.m9} />
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        )}

                        {/* 印刷時には常にトーナメント形式を表示するようにスタイルを調整 */}
                        <div className="hidden print:block">
                            <div className="flex flex-wrap gap-8">
                                <div className="flex flex-col gap-4 scale-90 origin-top-left">
                                    <MatchCard id="m1" label="1" match={matches.m1} />
                                    <MatchCard id="m2" label="2" match={matches.m2} />
                                    <MatchCard id="m3" label="3" match={matches.m3} />
                                    <MatchCard id="m4" label="4" match={matches.m4} />
                                    <MatchCard id="m7" label="7" match={matches.m7} />
                                    <MatchCard id="m8" label="8" match={matches.m8} />
                                    <MatchCard id="m11" label="11" match={matches.m11} isFinal={true} />
                                    <MatchCard id="m10" label="10" match={matches.m10} />
                                </div>
                                <div className="flex flex-col gap-4 scale-90 origin-top-left">
                                    <MatchCard id="m5" label="5" match={matches.m5} />
                                    <MatchCard id="m6" label="6" match={matches.m6} />
                                    <MatchCard id="m9" label="9" match={matches.m9} />
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* モバイル用ナビゲーション */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 flex justify-around items-center no-print sm:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                        <div className="text-[10px] font-bold text-slate-400">
                             名前をタップ ➔ 勝者確定
                        </div>
                        <div className="h-4 w-[1px] bg-slate-200"></div>
                        <div className="text-[10px] font-black text-blue-600">
                             ハンドボール・スコア対応
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
