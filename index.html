<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会結果報告 | 令和7年度 浦添・那覇地区中学生春季ハンドボール大会</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

body { font-family:'Noto Sans JP',sans-serif;background:#f1f5f9;color:#0f172a; }

@media print {
  @page { size:A4 portrait;margin:8mm; }
  body { background:white !important; }
  .no-print { display:none !important; }
  .print-wrapper { width:100%!important;margin:0 auto!important;box-shadow:none!important;border:none!important;padding:0!important; }
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button { -webkit-appearance:none;margin:0; }

input::placeholder { color:#cbd5e1; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const INITIAL_STATE = {
m1:{p1:"浦西",p2:"松島",s1:"",s2:"",winner:null,loser:null,time:"9:00",official:"石田"},
m2:{p1:"昭薬",p2:"ITS",s1:"",s2:"",winner:null,loser:null,time:"9:30",official:"松島"},
m3:{p1:"コラソン",p2:"港川",s1:"",s2:"",winner:null,loser:null,time:"10:00",official:"ITS"},
m4:{p1:"石田",p2:"浦添",s1:"",s2:"",winner:null,loser:null,time:"10:30",official:"港川"},
m5:{p1:"1敗者",p2:"2敗者",s1:"",s2:"",winner:null,time:"11:00",official:"浦添"},
m6:{p1:"3敗者",p2:"4敗者",s1:"",s2:"",winner:null,time:"11:30",official:"5の勝者"},
m7:{p1:"1勝者",p2:"2勝者",s1:"",s2:"",winner:null,loser:null,time:"12:00",official:"6の勝者"},
m8:{p1:"3勝者",p2:"4勝者",s1:"",s2:"",winner:null,loser:null,time:"12:30",official:"浦西"},
m9:{p1:"5勝者",p2:"6勝者",s1:"",s2:"",winner:null,time:"13:00",official:"8の敗者"},
m10:{p1:"7敗者",p2:"8敗者",s1:"",s2:"",winner:null,time:"13:30",official:"9の勝者"},
m11:{p1:"7勝者",p2:"8勝者",s1:"",s2:"",winner:null,time:"14:00",official:"10の敗者"}
};

const isPlaceholder = n => !n || n.includes("勝者") || n.includes("敗者");

/* 線 */
const BracketLine = ({x1,y1,x2,y2})=>{
const midX = x1 + (x2-x1)/2;
return <path d={`M${x1} ${y1} L${midX} ${y1} L${midX} ${y2} L${x2} ${y2}`} stroke="#475569" strokeWidth="2.5" fill="none"/>
};

const App = () => {

const [matches,setMatches]=useState(()=>JSON.parse(localStorage.getItem("hb_tournament"))||INITIAL_STATE);
const [manager,setManager]=useState(()=>localStorage.getItem("hb_manager")||"");

useEffect(()=>{
localStorage.setItem("hb_tournament",JSON.stringify(matches));
localStorage.setItem("hb_manager",manager);
},[matches,manager]);

const advanceTournament=(state,id,side)=>{
const m=state[id];
if(isPlaceholder(m.p1)||isPlaceholder(m.p2)) return state;

const win = side==="p1"?m.p1:m.p2;
const lose = side==="p1"?m.p2:m.p1;

state[id].winner=win;
state[id].loser=lose;

const update=(mid,pos,name)=>{
state[mid][pos]=name;
state[mid].winner=null;
};

if(id==="m1"){update("m5","p1",lose);update("m7","p1",win);}
if(id==="m2"){update("m5","p2",lose);update("m7","p2",win);}
if(id==="m3"){update("m6","p1",lose);update("m8","p1",win);}
if(id==="m4"){update("m6","p2",lose);update("m8","p2",win);}
if(id==="m5"){update("m9","p1",win);}
if(id==="m6"){update("m9","p2",win);}
if(id==="m7"){update("m10","p1",lose);update("m11","p1",win);}
if(id==="m8"){update("m10","p2",lose);update("m11","p2",win);}

return state;
};

/* ⭐ 修正済み入力（ここが神ポイント） */
const updateScore=(id,side,val)=>{
if(!/^\d{0,2}$/.test(val)) return;

setMatches(prev=>{
const next=JSON.parse(JSON.stringify(prev));
next[id][side]=val;

const s1=parseInt(next[id].s1);
const s2=parseInt(next[id].s2);

if(!isNaN(s1)&&!isNaN(s2)&&s1!==s2){
return advanceTournament(next,id,s1>s2?"p1":"p2");
}
return next;
});
};

const manualWin=(id,side)=>{
setMatches(prev=>advanceTournament(JSON.parse(JSON.stringify(prev)),id,side));
};

const MatchCard=({id,label,m,isFinal})=>{
const ready=!isPlaceholder(m.p1)&&!isPlaceholder(m.p2);

return(
<div className={`w-[180px] h-[80px] border-2 rounded bg-white ${isFinal?"border-amber-400":"border-slate-300"}`}>

<div className="h-[20px] bg-slate-800 text-white text-[9px] flex justify-between px-2 items-center">
<span>No.{label} {m.time}</span>
<span>OF:{m.official}</span>
</div>

{[1,2].map(n=>{
const side=`p${n}`;
const win=m.winner===m[side];
const lose=m.winner && !win;

return(
<div key={n} className={`flex h-[30px] ${win?"bg-blue-200 font-bold text-blue-900":""} ${lose?"bg-gray-100 text-gray-400":""}`}>
<button onClick={()=>manualWin(id,side)} disabled={!ready} className="flex-1 text-left px-2 text-[12px]">
{m[side]}
</button>

<input
type="tel"
inputMode="numeric"
value={m["s"+n]||""}
onChange={e=>updateScore(id,"s"+n,e.target.value)}
className="w-[50px] text-center border-l text-[14px] font-black"
/>

</div>
);
})}

</div>
);
};

/* 座標 */
const X1=0,X2=230,X3=460;
const Y={m1:0,m2:110,m3:240,m4:350,m7:55,m8:295,m11:175,m10:350};

return(
<div className="p-4 flex justify-center">

<div className="print-wrapper bg-white p-6">

<h1 className="text-center font-bold mb-4">
令和7年度 浦添・那覇地区中学生春季ハンドボール大会（女子の部）
</h1>

<div className="relative w-[640px] h-[430px]">

<svg className="absolute w-full h-full">
<BracketLine x1={180} y1={40} x2={230} y2={90}/>
<BracketLine x1={180} y1={150} x2={230} y2={120}/>
<BracketLine x1={180} y1={280} x2={230} y2={320}/>
<BracketLine x1={180} y1={390} x2={230} y2={350}/>
<BracketLine x1={410} y1={120} x2={460} y2={200}/>
<BracketLine x1={410} y1={320} x2={460} y2={200}/>
</svg>

<div style={{position:"absolute",left:X1,top:Y.m1}}><MatchCard id="m1" label="1" m={matches.m1}/></div>
<div style={{position:"absolute",left:X1,top:Y.m2}}><MatchCard id="m2" label="2" m={matches.m2}/></div>
<div style={{position:"absolute",left:X1,top:Y.m3}}><MatchCard id="m3" label="3" m={matches.m3}/></div>
<div style={{position:"absolute",left:X1,top:Y.m4}}><MatchCard id="m4" label="4" m={matches.m4}/></div>

<div style={{position:"absolute",left:X2,top:Y.m7}}><MatchCard id="m7" label="7" m={matches.m7}/></div>
<div style={{position:"absolute",left:X2,top:Y.m8}}><MatchCard id="m8" label="8" m={matches.m8}/></div>

<div style={{position:"absolute",left:X3,top:Y.m11-20}}>
<div className="text-center text-amber-600 text-xs font-bold">決勝戦</div>
<MatchCard id="m11" label="11" m={matches.m11} isFinal/>
</div>

<div style={{position:"absolute",left:X3,top:Y.m10-20}}>
<div className="text-center text-gray-600 text-xs">3位決定戦</div>
<MatchCard id="m10" label="10" m={matches.m10}/>
</div>

</div>

<div className="mt-6 border-t pt-4">
<h2 className="text-sm font-bold mb-2">敗者交流戦</h2>

<div className="flex gap-6">
<MatchCard id="m5" label="5" m={matches.m5}/>
<MatchCard id="m6" label="6" m={matches.m6}/>
<MatchCard id="m9" label="9" m={matches.m9}/>
</div>
</div>

<div className="mt-6 text-right font-bold">
会場責任者：{manager||"＿＿＿＿＿＿"}
</div>

</div>
</div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
