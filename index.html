<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会結果報告</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Noto Sans JP', sans-serif; }

.scroll-x { overflow-x:auto; }

@media print {
  @page { size:A4 portrait; margin:10mm; }
  body { background:white; }
  .no-print { display:none; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ===== 初期 ===== */
const INITIAL = {
  m1:{p1:"浦西",p2:"松島",s1:"",s2:""},
  m2:{p1:"昭薬",p2:"ITS",s1:"",s2:""},
  m3:{p1:"コラソン",p2:"港川",s1:"",s2:""},
  m4:{p1:"石田",p2:"浦添",s1:"",s2:""},
};

/* ===== アプリ ===== */
function App(){

const [data,setData] = useState(
  JSON.parse(localStorage.getItem("data")) || INITIAL
);

useEffect(()=>{
  localStorage.setItem("data",JSON.stringify(data));
},[data]);

return (
<div className="p-4 text-[12px]">

{/* ===== タイトル ===== */}
<div className="text-center mb-2">
  <h1 className="text-lg font-bold">
    令和7年度 浦添・那覇地区中学生春季ハンドボール大会
  </h1>
  <div className="font-bold">【女子の部】</div>
</div>

{/* ===== トーナメント ===== */}
<div className="mb-4">

  <div className="text-center font-bold mb-1">トーナメント</div>

  <div className="scroll-x">
    <div className="min-w-[700px]">

      {/* SVG完全再現 */}
      <svg width="700" height="250">

        {/* 決勝 */}
        <line x1="350" y1="20" x2="350" y2="60" stroke="black"/>
        <rect x="200" y="0" width="300" height="20" fill="none" stroke="black"/>

        {/* 左 */}
        <line x1="200" y1="60" x2="200" y2="100" stroke="black"/>
        <line x1="200" y1="100" x2="100" y2="100" stroke="black"/>
        <line x1="100" y1="100" x2="100" y2="140" stroke="black"/>

        {/* チーム名 */}
        <text x="80" y="160">浦西</text>
        <text x="120" y="160">松島</text>

      </svg>

    </div>
  </div>

  <div className="text-center font-bold mt-2">
    敗者交流戦
  </div>

</div>

{/* ===== 試合順 ===== */}
<table className="w-full border text-[11px]">
<thead>
<tr className="bg-gray-200">
<th>試合</th>
<th>時間</th>
<th>対戦</th>
<th>オフィシャル</th>
</tr>
</thead>

<tbody>
<tr><td>1</td><td>9:00</td><td>浦西 - 松島</td><td>石田</td></tr>
<tr><td>2</td><td>9:30</td><td>昭薬 - ITS</td><td>松島</td></tr>
<tr><td>3</td><td>10:00</td><td>コラソン - 港川</td><td>ITS</td></tr>
<tr><td>4</td><td>10:30</td><td>石田 - 浦添</td><td>港川</td></tr>
</tbody>
</table>

{/* ===== ボタン ===== */}
<div className="no-print mt-3 flex gap-2">
<button onClick={()=>window.print()}
className="bg-black text-white px-3 py-1 rounded">
印刷
</button>

<button onClick={()=>{
  if(confirm("リセットしますか？")){
    setData(INITIAL);
  }
}}
className="border px-3 py-1 rounded">
リセット
</button>
</div>

{/* ===== 署名 ===== */}
<div className="mt-6 text-right font-bold">
会場責任者：＿＿＿＿＿＿＿＿
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
