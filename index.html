<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Noto Sans JP', sans-serif; }

@media print {
  @page { size:A4 portrait; margin:8mm; }
  body { background:white; }
  .no-print { display:none; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ===== データ ===== */
const INITIAL = {
  m1:{no:1,time:"9:00",off:"石田",p1:"浦西",p2:"松島"},
  m2:{no:2,time:"9:30",off:"松島",p1:"昭薬",p2:"ITS"},
  m3:{no:3,time:"10:00",off:"ITS",p1:"コラソン",p2:"港川"},
  m4:{no:4,time:"10:30",off:"港川",p1:"石田",p2:"浦添"},
  m5:{no:5,time:"11:00",off:"浦添",p1:"1敗者",p2:"2敗者"},
  m6:{no:6,time:"11:30",off:"5勝者",p1:"3敗者",p2:"4敗者"},
  m7:{no:7,time:"12:00",off:"6勝者",p1:"1勝者",p2:"2勝者"},
  m8:{no:8,time:"12:30",off:"浦西",p1:"3勝者",p2:"4勝者"},
  m9:{no:9,time:"13:00",off:"8敗者",p1:"5勝者",p2:"6勝者"},
  m10:{no:10,time:"13:30",off:"9勝者",p1:"7敗者",p2:"8敗者"},
  m11:{no:11,time:"14:00",off:"10敗者",p1:"7勝者",p2:"8勝者"}
};

function App(){

const [data,setData]=useState(
  JSON.parse(localStorage.getItem("tournament"))||INITIAL
);

useEffect(()=>{
  localStorage.setItem("tournament",JSON.stringify(data));
},[data]);

const winner=(m)=>{
  if(!m.s1||!m.s2) return null;
  return Number(m.s1)>Number(m.s2)?"p1":"p2";
};

const update=(id,side,val)=>{
  const next={...data,[id]:{...data[id],[side]:val}};
  const m=next[id];
  const w=winner(m);

  if(w){
    if(id==="m1"){next.m5.p1=m.p2;next.m7.p1=m[w];}
    if(id==="m2"){next.m5.p2=m.p1;next.m7.p2=m[w];}
    if(id==="m3"){next.m6.p1=m.p2;next.m8.p1=m[w];}
    if(id==="m4"){next.m6.p2=m.p1;next.m8.p2=m[w];}
    if(id==="m5") next.m9.p1=m[w];
    if(id==="m6") next.m9.p2=m[w];
    if(id==="m7"){next.m10.p1=m.p1===m[w]?m.p2:m.p1;next.m11.p1=m[w];}
    if(id==="m8"){next.m10.p2=m.p1===m[w]?m.p2:m.p1;next.m11.p2=m[w];}
  }

  setData(next);
};

const Card=(id,label)=>{
  const m=data[id];
  const w=winner(m);

  return (
  <div className="w-[170px] border text-[10px] bg-white">
    <div className="bg-gray-100 px-1 flex justify-between">
      <span>No.{m.no} {m.time}</span>
      <span>{m.off}</span>
    </div>

    {[1,2].map(n=>{
      const side=`p${n}`;
      const isWin = w && m[side]===m[w];

      return (
      <div key={n}
        className={`flex border-t ${isWin?"bg-blue-200 font-bold":"bg-gray-100"}`}>
        <div className="flex-1 px-1">{m[side]}</div>
        <input type="number"
          value={m[`s${n}`]||""}
          onChange={e=>update(id,`s${n}`,e.target.value)}
          className="w-8 border-l text-center"/>
      </div>
      );
    })}
  </div>
  );
};

return (
<div className="w-[780px] mx-auto text-[12px]">

{/* タイトル */}
<div className="text-center mb-2">
<h1 className="font-bold text-lg">
令和7年度 浦添・那覇地区中学生春季ハンドボール大会
</h1>
<div className="font-bold">【女子の部】</div>
</div>

{/* ===== メイントーナメント ===== */}
<div className="relative h-[360px] border p-2">

<div className="absolute left-0 top-0">{Card("m1")}</div>
<div className="absolute left-0 top-70px">{Card("m2")}</div>
<div className="absolute left-0 top-[180px]">{Card("m3")}</div>
<div className="absolute left-0 top-[250px]">{Card("m4")}</div>

<div className="absolute left-[200px] top-[40px]">{Card("m7")}</div>
<div className="absolute left-[200px] top-[210px]">{Card("m8")}</div>

<div className="absolute left-[420px] top-[120px]">
  <div className="text-center text-xs font-bold">決勝戦</div>
  {Card("m11")}
</div>

<div className="absolute left-[420px] top-[260px]">
  <div className="text-center text-xs">3位決定戦</div>
  {Card("m10")}
</div>

</div>

{/* ===== 敗者交流戦 ===== */}
<div className="mt-3 border p-2 relative h-[200px]">

<div className="font-bold mb-1">敗者交流戦</div>

<div className="absolute left-0 top-[30px]">{Card("m5")}</div>
<div className="absolute left-0 top-[110px]">{Card("m6")}</div>

<div className="absolute left-[200px] top-[70px]">{Card("m9")}</div>

</div>

{/* ボタン */}
<div className="no-print mt-2 flex gap-2">
<button onClick={()=>window.print()} className="bg-black text-white px-3 py-1">
印刷
</button>
<button onClick={()=>setData(INITIAL)} className="border px-3 py-1">
リセット
</button>
</div>

{/* 署名 */}
<div className="mt-3 text-right font-bold">
会場責任者：＿＿＿＿＿＿＿＿
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
